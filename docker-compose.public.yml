services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - STS_DOMAIN=${STS_DOMAIN}
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: .
    command: ./scripts/run_public_api.sh
    expose:
      - "8080"
    env_file:
      - .env

volumes:
  caddy_data:
  caddy_config:
