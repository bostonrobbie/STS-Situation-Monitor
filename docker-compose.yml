services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sts
      POSTGRES_USER: sts
      POSTGRES_PASSWORD: sts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    command: uvicorn sts_monitor.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
