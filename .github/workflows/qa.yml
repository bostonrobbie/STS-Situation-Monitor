name: QA

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=sts_monitor --cov-report=term-missing --cov-fail-under=75
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sts-monitor:ci .
      - name: Smoke test container
        run: |
          docker run -d --name sts-smoke \
            -e STS_AUTH_API_KEY=ci-test \
            -e STS_DATABASE_URL=sqlite:///./sts_monitor.db \
            -p 8080:8080 \
            sts-monitor:ci
          sleep 5
          curl -sf http://localhost:8080/health | grep -q ok
          docker stop sts-smoke
